<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Open Graph -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  {% if page.layout == 'post' %}
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
  {% endif %}

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6464921081676309" crossorigin="anonymous"></script>
</head>
<body>
  {% include header.html %}

  <!-- 상단 배너 광고 -->
  <div class="ad-top-wrap">
    <div class="ad-top-inner">
      <div class="ad-card">
        <span class="ad-card-label">advertisement</span>
        <ins class="adsbygoogle"
             style="display:block;width:100%"
             data-ad-client="ca-pub-6464921081676309"
             data-ad-slot="8621795850"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
    </div>
  </div>

  <!-- 본문 + 사이드바 -->
  <div class="page-layout">
    <main class="main-wrap">
      {{ content }}
    </main>

    <!-- 사이드바 광고 (sticky) -->
    <aside class="ad-sidebar">
      <div class="ad-sidebar-inner">
        <div class="ad-card">
          <span class="ad-card-label">advertisement</span>
          <ins class="adsbygoogle"
               style="display:block;width:100%"
               data-ad-client="ca-pub-6464921081676309"
               data-ad-slot="7048523029"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
          <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
      </div>
    </aside>
  </div>

  {% include footer.html %}
</body>
</html>
