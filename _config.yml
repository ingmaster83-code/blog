title: 우아하우스 블로그
description: >-
  PDF 변환, 이미지 압축, QR코드 생성 등 무료 온라인 도구 완벽 활용 가이드.
  설치 없이 브라우저에서 바로 사용하세요.
url: "https://blog.wooahouse.com"
baseurl: ""
lang: ko
timezone: Asia/Seoul
author: WooaHouse

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
highlighter: rouge
permalink: /:year/:month/:title/

plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag

paginate: 10
paginate_path: "/page:num/"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - Gemfile
  - Gemfile.lock
  - generate_post.py
  - keywords.json
  - "*.bat"
  - README.md
  - .gitignore
  - vendor/
